<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeRoad - Combat</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png.png">
    <link rel="stylesheet" href="../css/base.css?v=1.1">
    <link rel="stylesheet" href="../css/components.css?v=1.1">
    <link rel="stylesheet" href="../css/battle.css?v=1.1">
</head>
<body>
    <div id="game-screen">
        <div id="scaler-view" class="battle-bg">
            <!-- HUD SUPÉRIEUR (Vague, Tours, Actions) -->
            <div id="battle-top-bar">
                <div id="hudProgress"></div>
                <div id="turnOrderContainer">
                    <div class="turn-order-sidebar" id="turnOrderSidebar"></div>
                </div>
                <div id="top-right-actions" class="battle-actions">
                    <div class="speed-controls">
                        <button class="speed-btn active" data-speed="1" onclick="setBattleSpeed(1)">x1</button>
                        <button class="speed-btn" data-speed="2" onclick="setBattleSpeed(2)">x2</button>
                        <button class="speed-btn" data-speed="4" onclick="setBattleSpeed(4)">x4</button>
                    </div>
                    <button class="exit-btn" id="home-flee-btn" title="Retour">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    </button>
                </div>
            </div>

            <!-- Zone de combat 1v1 -->
            <div id="battleArena">
                <div class="slot side-left">
                    <div class="unit-slot"></div>
                </div>
                <div class="slot side-right">
                    <div class="unit-slot"></div>
                </div>
            </div>

            <!-- Grilles d'équipe (joueur et ennemi) -->
            <div id="player-grid" class="team-grid"></div>
            <div id="enemy-grid" class="team-grid"></div>

            <!-- Panneau d'informations générales -->
            <div id="infoDisplayPanel" class="glass-panel"></div>

            <!-- Message de statut de combat (Victoire/Défaite) -->
            <div id="battleStatus"></div>

            <!-- Pied de page de combat -->
            <div id="battle-footer">
                <!-- Bannière de sélection des Pokémon (pré-combat) -->
                <div id="selection-banner"></div>

                <!-- Panneau d'actions (en combat) -->
                <div id="combat-panel">
                    <div id="turn-unit-display"></div>
                    <div id="actionPanel">
                        <div id="movesRow" class="movesRow"></div>
                        <div id="targetPrompt" class="target-prompt"></div>
                    </div>
                </div>
                <div id="side-actions">
                    <button class="pk-btn-action" id="start-battle-btn" onclick="startBattle()">DÉMARRER</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Conteneur pour le fantôme de drag & drop -->
    <div id="drag-ghost">
        <img id="ghost-img" src="" alt="drag ghost">
    </div>

    <!-- Conteneur pour les effets ambiants -->
    <div id="ambient-effects"></div>

    <!-- JavaScript -->
    <script src="../js/storage.js?v=1.1"></script>
    <script src="../js/gamedata.js?v=1.1"></script>
    <script src="../js/progression.js?v=1.1"></script>
    <script src="../js/battle.js?v=1.1"></script>
    <script src="../js/battle_animation.js?v=1.1"></script>
    <script src="../js/battle-ui.js?v=1.1"></script>
    <script src="../js/mobile-manager.js?v=1.1"></script></body>
</html>
