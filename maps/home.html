<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeRoad - Accueil</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- CSS -->
    <link rel="stylesheet" href="../css/base.css?v=1.1">
    <link rel="stylesheet" href="../css/components.css?v=1.1">
    <link rel="stylesheet" href="../css/battle.css?v=1.1">
    <link rel="stylesheet" href="../css/home.css?v=1.1">
    <link rel="stylesheet" href="../css/refinement.css?v=1.1">
</head>
<body>
    <div id="game-screen">
        <div id="scaler-view">
            <!-- HUD Joueur & Missions -->
            <div class="top-left-container" id="main-hud-row">
                <div id="player-hud">
                    <div id="player-avatar-container">
                        <img id="player-avatar-img" src="../assets/boy.png" alt="Avatar">
                    </div>
                    <div id="player-info">
                        <span id="player-name"></span>
                        <span id="player-money"></span>
                    </div>
                </div>
                
                <button id="mission-btn" class="map-btn mission-hud" onclick="openMissionModal()">
                    <div id="mission-btn-team-preview" class="team-preview-mini"></div>
                    <div class="mission-hud-content">
                        <div id="mission-btn-label">Missions</div>
                        <div id="mission-btn-timer" class="timer-mini"></div>
                    </div>
                </button>
            </div>

            <!-- Hitboxes (zones cliquables) -->
            <div id="zone-center" class="hitbox" onclick="ouvrirCentrePokemon()" title="Centre Pokémon" style="transform: none;"></div>
            <div id="zone-labo" class="hitbox" onclick="allerAuLabo()" title="Laboratoire" style="transform: none;"></div>
            <div id="zone-refinement" class="hitbox" onclick="RefinementUI.open()" title="Atelier de Raffinement" style="transform: none;"></div>

            <!-- Boutons de repères sur la carte -->
            <button class="landmark-btn" id="btn-landmark-center" onclick="ouvrirCentrePokemon()">
                <span>Centre</span>
            </button>
            <button class="landmark-btn" id="btn-landmark-lab" onclick="allerAuLabo()">
                <span>Laboratoire</span>
            </button>
            <button class="landmark-btn" id="btn-landmark-refinement" onclick="RefinementUI.open()">
                <span>Atelier</span>
            </button>
            <button class="landmark-btn" id="btn-landmark-shop" onclick="openShopModal()">
                <span>Boutique</span>
            </button>

            <!-- Bouton Aventure -->
            <button class="road-btn" onclick="allerALaventure()">
                <span>Aventure</span>
                <div class="arrow-anim">➤</div>
            </button>

            <div id="side-actions">
                <button id="pokedex-btn" class="map-btn secondary" onclick="openPokedex()" title="Pokédex">
                    <img src="../assets/pokedex.png" alt="Pokédex">
                </button>
                <button id="egg-bag-btn" class="map-btn secondary" onclick="openEggBagModal()" title="Sac à Œufs">
                    <img src="../assets/egg.png" alt="Eggs">
                </button>
                <button id="item-bag-btn" class="map-btn secondary" onclick="openItemBagModal()" title="Sac à Objets">
                    <span style="font-size: 24px;">🎒</span>
                </button>
            </div>

            <!-- Settings Wheel Icon & Exit -->
            <div id="top-right-actions" class="home-actions">
                <button class="pk-btn-action" id="settings-btn" onclick="openSettings()" title="Paramètres">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0-.33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9A1.65 1.65 0 0 0 10 3.6V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 .33 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
        </div>

        <!-- Modal Settings -->
        <div id="settings-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="closeSettings()">&times;</span>
                <h2>Paramètres</h2>
                <div class="profile-edit">
                    <input type="text" id="edit-player-name" placeholder="Votre nom" style="padding:10px; border-radius:5px; border:1px solid #ccc; width:100%; box-sizing:border-box;">
                    <div class="gender-selection">
                        <label><input type="radio" name="player-gender" value="boy"> Garçon</label>
                        <label><input type="radio" name="player-gender" value="girl"> Fille</label>
                    </div>
                    <button class="pk-btn-action small" onclick="saveProfile()">Enregistrer Profil</button>
                </div>
                <div class="settings-group">
                    <h3>Données</h3>
                    <button class="pk-btn-action small" onclick="exportSave()">Exporter Sauvegarde</button>
                    <label class="pk-btn-action small" style="text-align:center; display:block; cursor:pointer;">
                        Importer Sauvegarde
                        <input type="file" id="import-save-btn" onchange="importSave(event)" style="display:none;" accept=".json">
                    </label>
                    <button class="pk-btn-action small danger-btn" onclick="eraseData()">Effacer les données</button>
                </div>
            </div>
        </div>

        <!-- Modal Missions -->
        <div id="mission-modal" class="modal">
            <div class="modal-content mission-content">
                <span class="close-btn" onclick="closeMissionModal()">&times;</span>
                <h2>Tableau des Missions</h2>
                
                <!-- Vue 1 : Sélection de Mission -->
                <div id="mission-board-view">
                    <div id="active-mission-status" style="display:none; margin-bottom: 20px;">
                        <!-- Bannière de mission en cours -->
                        <div class="active-mission-banner">
                            <h3>Mission en cours : <span id="active-mission-name"></span></h3>
                            <div class="mission-timer-large" id="mission-timer-large">00:00:00</div>
                            <button class="pk-btn-action" id="mission-return-btn" style="display:none;" onclick="completeMission()">Rapport de Mission</button>
                        </div>
                    </div>

                    <div id="mission-cards-container" class="mission-cards-container">
                        <!-- Généré par JS : 3 cartes de mission -->
                    </div>
                </div>

                <!-- Vue 2 : Sélection d'Équipe (Caché par défaut) -->
                <div id="mission-team-view" style="display:none;">
                    <div class="mission-header">
                        <button class="modal-back-btn" onclick="backToMissionBoard()">⬅</button>
                        <h3 id="selected-mission-title" style="margin-left: 40px;">Mission : ...</h3>
                    </div>
                    
                    <div class="mission-affinity-info">
                        <span id="mission-affinity-badge">Biome : Forêt</span>
                        <small>Recommandé : <span id="mission-affinity-types">Plante, Insecte</span></small>
                    </div>

                    <div id="mission-selection-grid"></div>
                    
                    <div class="mission-footer">
                        <div id="team-preview-bar"></div>
                        <button id="start-mission-btn" class="pk-btn-action" onclick="confirmStartMission()" disabled>Départ !</button>
                    </div>
                </div>

                <!-- Vue 3 : Rapport de Mission (Caché par défaut) -->
                <div id="mission-report-view" style="display:none;">
                    <h3>Rapport de Mission</h3>
                    
                    <h4>Équipe de Mission :</h4>
                    <div id="mission-report-team" style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;"></div>

                    <div id="mission-logs" class="mission-logs">
                        <!-- Logs générés -->
                    </div>
                    <div class="mission-rewards">
                        <h4>Récompenses</h4>
                        <div id="mission-rewards-list"></div>
                    </div>
                    <button class="pk-btn-action" onclick="claimRewardsAndClose()">Récupérer & Fermer</button>
                </div>
            </div>
        </div>

        <!-- Modal Sac à Oeufs -->
        <div id="egg-bag-modal" class="modal">
            <div class="modal-content egg-bag-content">
                <span class="close-btn" onclick="closeEggBagModal()">&times;</span>
                <div class="egg-bag-layout">
                    <div id="egg-bag-sidebar">
                        <h3>Inventaire</h3>
                        <div id="egg-rarity-filters">
                            <!-- Généré par JS : filtres par rareté -->
                        </div>
                    </div>
                    <div id="egg-bag-main">
                        <div class="egg-bag-header">
                            <div class="header-main">
                                <h2>Sélectionner un œuf</h2>
                                <div id="egg-bag-total-count">0 œuf(s)</div>
                            </div>
                            <button class="pk-btn-action small" onclick="allerAuLabo('incubator')">
                                🧪 Aller au Labo (Incubateurs)
                            </button>
                        </div>
                        <div id="egg-selection-grid">
                            <!-- Liste des œufs individuels filtrée générée par JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal Sac à Objets -->
        <div id="item-bag-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="closeItemBagModal()">&times;</span>
                <h2>Sac à Objets</h2>
                <!-- Nouveau : Navigation par poche pour le sac -->
                <div id="item-bag-pockets" class="shop-pockets" style="margin-bottom: 15px;">
                    <!-- Généré par JS -->
                </div>
                <div id="item-bag-grid" class="item-grid-home">
                    <!-- Contenu généré par home.js -->
                </div>
            </div>
        </div>

        <!-- Modal Boutique -->
        <div id="shop-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="closeShopModal()">&times;</span>
                <h2>Boutique Pokémon</h2>
                <div id="shop-categories" class="shop-tabs">
                    <button class="shop-tab active" onclick="switchShopTab('upgrades')">Améliorations</button>
                    <button class="shop-tab" onclick="switchShopTab('eggs')">Œufs</button>
                    <button class="shop-tab" onclick="switchShopTab('items')">Objets</button>
                </div>
                <!-- Nouveau : Navigation par poche pour les objets -->
                <div id="shop-pockets" class="shop-pockets" style="display:none;">
                    <!-- Généré par JS -->
                </div>
                <div id="shop-grid" class="shop-grid">
                    <!-- Contenu généré par home.js -->
                </div>
            </div>
        </div>
    </div>
    </div>

    <!-- Modal Détails Objet -->
    <div id="item-info-modal" class="modal" style="z-index: 2000;">
        <div class="modal-content" style="max-width: 400px; padding: 20px;">
            <span class="close-btn" onclick="closeItemInfoModal()">&times;</span>
            <div id="item-info-content" style="text-align: center;">
                <!-- Rempli par JS -->
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="../js/storage.js?v=1.1"></script>
    <script src="../js/gamedata.js?v=1.1"></script>
    <script src="../js/refinement.js?v=1.1"></script>
    <script src="../js/refinement-ui.js?v=1.1"></script>
    <script src="../js/home.js?v=1.1"></script>
    <script src="../js/mobile-manager.js?v=1.1"></script></body>
</html>
