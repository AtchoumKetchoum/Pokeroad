<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atelier - PokéRoad</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/refinement.css">
    <style>
        .atelier-container {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        .atelier-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        .atelier-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .atelier-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
            border-color: #f39c12;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .atelier-icon {
            font-size: 48px;
        }
        .atelier-title {
            font-size: 20px;
            font-weight: bold;
            color: #f39c12;
        }
        .atelier-desc {
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div id="game-screen" class="atelier-screen">
        <div id="scaler-view" class="atelier-viewport">
            <!-- Barre de Navigation Supérieure -->
            <div id="top-right-actions">
                <button class="exit-btn" onclick="window.location.href='home.html'" title="Quitter">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </button>
            </div>

            <h1 style="color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 20px; font-size: 2em; font-family: var(--font-pixel); text-align: center;">Atelier d'Artisanat</h1>

            <div class="atelier-menu">
                <!-- Refinement Section -->
                <div class="atelier-card" onclick="RefinementUI.open(null, 'items')">
                    <div class="atelier-icon">🔧</div>
                    <div class="atelier-title">Améliorer Objets</div>
                    <div class="atelier-desc">Augmentez l'efficacité de vos objets de combat et baies.</div>
                </div>

                <!-- Future Crafting Section -->
                <div class="atelier-card" style="opacity: 0.5; cursor: not-allowed;">
                    <div class="atelier-icon">⚗️</div>
                    <div class="atelier-title">Fabriquer (Bientôt)</div>
                    <div class="atelier-desc">Combinez des ressources pour créer de nouveaux objets.</div>
                </div>

                <!-- Future Recycling Section -->
                <div class="atelier-card" style="opacity: 0.5; cursor: not-allowed;">
                    <div class="atelier-icon">♻️</div>
                    <div class="atelier-title">Recycler (Bientôt)</div>
                    <div class="atelier-desc">Transformez vos objets inutiles en matériaux.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/gamedata.js"></script>
    <script src="../js/refinement.js"></script>
    <script src="../js/refinement-ui.js"></script>
    <script>
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
             GameData.init();
             RefinementUI.init();
        });
    </script>
</body>
</html>
