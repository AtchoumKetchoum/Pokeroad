<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeRoad - Pokédex</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png.png">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pokedex.css"> <!-- New CSS file -->
</head>
<body>
    <div id="game-screen">
        <div id="scaler-view" class="pokedex-viewport">
            <!-- Barre de Navigation Supérieure -->
            <div id="top-right-actions">
                <button class="exit-btn" onclick="goToHome()" title="Quitter">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </button>
            </div>

            <h1>Pokédex</h1>
            <div id="pokedex-filters">
                <!-- Les filtres sont générés par pokedex.js -->
            </div>
            <div id="pokedex-grid">
                <!-- Pokémon entries will be loaded here by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Modal for Pokémon Details -->
    <div id="pokemon-detail-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="document.getElementById('pokemon-detail-modal').style.display='none'">&times;</span>
            <div id="pokemon-detail-content">
                <!-- Details will be loaded here by JavaScript -->
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        function goToHome() { window.location.href = 'home.html'; }
        function ouvrirCentrePokemon() { window.location.href = 'center.html'; }
        function allerAuLabo(focus) { window.location.href = focus === 'incubator' ? 'labo.html?open=incubator' : 'labo.html'; }
    </script>
    <script src="/js/storage.js"></script>
    <script src="/js/gamedata.js"></script>
    <script src="/js/refinement.js"></script>
    <script src="/js/refinement-ui.js"></script>
    <script src="/js/pokedex.js"></script> <!-- New JS file -->
</body>
</html>
